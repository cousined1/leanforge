<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>opencode-design · sample · iOS prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0;
               background: linear-gradient(180deg, #efeef0 0%, #d8d6dc 100%);
               min-height: 100vh; }
  body { font-family: 'Inter', -apple-system, system-ui, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>
<script src="./_vendor/react.js"></script>
<script src="./_vendor/react-dom.js"></script>
<script src="./_vendor/babel.min.js"></script>

<script type="text/babel" data-presets="env,react">
// ─── ios_frame.jsx (inlined from assets/) ──────────────────────────────
const IosFrame = ({ children, theme = "light", time = "9:41" }) => {
  const isDark = theme === "dark";
  const screenBg = isDark ? "#0d0d0d" : "#ffffff";
  const statusFg = isDark ? "#f5f5f5" : "#1a1a1a";
  const indicatorBg = isDark ? "#f5f5f5" : "#1a1a1a";
  return (
    <div style={{
      width: 393, height: 852, position: "relative",
      borderRadius: 56, background: "#0a0a0a",
      padding: 8, boxSizing: "border-box",
      boxShadow: "0 30px 70px rgba(0,0,0,0.35), inset 0 0 0 1px rgba(255,255,255,0.04)",
      fontFamily: "-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif",
    }}>
      <div style={{
        width: "100%", height: "100%", borderRadius: 50,
        background: screenBg, overflow: "hidden", position: "relative",
      }}>
        {/* Dynamic Island */}
        <div style={{
          position: "absolute", top: 12, left: "50%", transform: "translateX(-50%)",
          width: 124, height: 36, borderRadius: 22,
          background: "#000", zIndex: 10,
        }} />
        {/* Status bar */}
        <div style={{
          position: "absolute", top: 16, left: 0, right: 0, height: 22,
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "0 30px", color: statusFg, fontSize: 16, fontWeight: 600,
          letterSpacing: -0.2, zIndex: 5, fontFeatureSettings: '"tnum"',
        }}>
          <span>{time}</span>
          <span style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 13 }}>
            <svg width="18" height="11" viewBox="0 0 18 11" fill={statusFg}>
              <rect x="0" y="7" width="3" height="4" rx="0.7"/>
              <rect x="5" y="5" width="3" height="6" rx="0.7"/>
              <rect x="10" y="2" width="3" height="9" rx="0.7"/>
              <rect x="15" y="0" width="3" height="11" rx="0.7"/>
            </svg>
            <svg width="16" height="11" viewBox="0 0 16 11" fill={statusFg}>
              <path d="M8 10.5a1.2 1.2 0 100-2.4 1.2 1.2 0 000 2.4zM3.6 6.5a6 6 0 018.8 0l-1.2 1.2a4.3 4.3 0 00-6.4 0L3.6 6.5zM1 4a9.7 9.7 0 0114 0l-1.2 1.2a8 8 0 00-11.5 0L1 4z"/>
            </svg>
            <svg width="26" height="12" viewBox="0 0 26 12" fill="none">
              <rect x="0.5" y="0.5" width="22" height="11" rx="3" stroke={statusFg} strokeOpacity="0.4"/>
              <rect x="2" y="2" width="18" height="8" rx="1.5" fill={statusFg}/>
              <rect x="23.5" y="4" width="2.5" height="4" rx="0.7" fill={statusFg} fillOpacity="0.4"/>
            </svg>
          </span>
        </div>
        {/* Content */}
        <div style={{ position: "absolute", top: 54, left: 0, right: 0, bottom: 0, overflow: "hidden" }}>
          {children}
        </div>
        {/* Home Indicator */}
        <div style={{
          position: "absolute", bottom: 8, left: "50%", transform: "translateX(-50%)",
          width: 134, height: 5, borderRadius: 3, background: indicatorBg, opacity: 0.85, zIndex: 5,
        }} />
      </div>
    </div>
  );
};

// ─── A habit-tracker home screen ───────────────────────────────────────
const HabitScreen = () => {
  const habits = [
    { name: "Run",         streak: 12, today: true,  color: "#ff4f00" },
    { name: "Read",        streak: 8,  today: true,  color: "#0066ff" },
    { name: "Sketch",      streak: 4,  today: false, color: "#8b5cf6" },
    { name: "Cold shower", streak: 23, today: true,  color: "#06b6d4" },
    { name: "Meditate",    streak: 0,  today: false, color: "#10b981" },
  ];
  const date = new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
  return (
    <div style={{ height: "100%", overflow: "auto", padding: "12px 24px 100px" }}>
      <div style={{ fontSize: 13, color: "#6b7280", letterSpacing: -0.1 }}>{date}</div>
      <h1 style={{ fontSize: 34, fontWeight: 700, letterSpacing: -0.7, margin: "4px 0 0 0", color: "#0a0a0a" }}>
        Today
      </h1>
      <div style={{ display: "flex", gap: 8, marginTop: 18, marginBottom: 24 }}>
        <div style={{ flex: 1, background: "#0a0a0a", color: "#fafafa", borderRadius: 16, padding: "16px 18px" }}>
          <div style={{ fontSize: 11, opacity: 0.6, textTransform: "uppercase", letterSpacing: 0.8 }}>Streak</div>
          <div style={{ fontSize: 30, fontWeight: 700, marginTop: 4, letterSpacing: -0.8,
                         fontFamily: "'JetBrains Mono', monospace" }}>23</div>
          <div style={{ fontSize: 12, opacity: 0.6, marginTop: 2 }}>days</div>
        </div>
        <div style={{ flex: 1, background: "#fafafa", border: "1px solid #e5e7eb", borderRadius: 16, padding: "16px 18px" }}>
          <div style={{ fontSize: 11, color: "#6b7280", textTransform: "uppercase", letterSpacing: 0.8 }}>Done</div>
          <div style={{ fontSize: 30, fontWeight: 700, marginTop: 4, letterSpacing: -0.8,
                         fontFamily: "'JetBrains Mono', monospace", color: "#0a0a0a" }}>3 / 5</div>
          <div style={{ fontSize: 12, color: "#6b7280", marginTop: 2 }}>habits today</div>
        </div>
      </div>
      <div style={{ fontSize: 11, color: "#6b7280", textTransform: "uppercase", letterSpacing: 0.8, fontWeight: 600, marginBottom: 8 }}>
        Habits
      </div>
      {habits.map(h => (
        <div key={h.name} style={{
          display: "flex", alignItems: "center", gap: 14,
          padding: "14px 4px", borderBottom: "1px solid #f3f4f6",
        }}>
          <div style={{
            width: 28, height: 28, borderRadius: "50%",
            background: h.today ? h.color : "transparent",
            border: h.today ? "none" : `2px solid ${h.color}`,
            display: "grid", placeItems: "center", flexShrink: 0,
          }}>
            {h.today && (
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M3 7.5L6 10L11 4.5" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            )}
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 16, fontWeight: 500, color: "#0a0a0a",
                           textDecoration: h.today ? "line-through" : "none",
                           textDecorationColor: "rgba(10,10,10,0.3)",
                           opacity: h.today ? 0.5 : 1 }}>
              {h.name}
            </div>
            <div style={{ fontSize: 12, color: "#9ca3af", marginTop: 2,
                           fontFamily: "'JetBrains Mono', monospace" }}>
              {h.streak === 0 ? "no streak" : `${h.streak}d streak`}
            </div>
          </div>
          {!h.today && (
            <div style={{
              fontSize: 11, fontWeight: 600, color: "#6b7280",
              padding: "5px 10px", borderRadius: 999, background: "#f3f4f6",
            }}>Mark done</div>
          )}
        </div>
      ))}
    </div>
  );
};

const App = () => (
  <div style={{ minHeight: "100vh", display: "flex", alignItems: "center",
                 justifyContent: "center", padding: 40, gap: 60, flexWrap: "wrap" }}>
    <IosFrame theme="light"><HabitScreen /></IosFrame>
    <IosFrame theme="dark">
      <div style={{ height: "100%", overflow: "auto", padding: "12px 24px", color: "#fafafa" }}>
        <div style={{ fontSize: 13, color: "#9ca3af" }}>{new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })}</div>
        <h1 style={{ fontSize: 34, fontWeight: 700, letterSpacing: -0.7, margin: "4px 0 0 0" }}>Today</h1>
        <div style={{ marginTop: 24, padding: 18, background: "#1a1a1c", borderRadius: 16, border: "1px solid #2a2a2c" }}>
          <div style={{ fontSize: 11, color: "#9ca3af", textTransform: "uppercase", letterSpacing: 0.8 }}>This week</div>
          <div style={{ display: "flex", gap: 6, marginTop: 14 }}>
            {[1,1,1,0,1,1,0].map((d, i) => (
              <div key={i} style={{
                flex: 1, height: 32, borderRadius: 6,
                background: d ? "#ff4f00" : "#262628",
              }} />
            ))}
          </div>
          <div style={{ fontSize: 12, color: "#9ca3af", marginTop: 10,
                         fontFamily: "'JetBrains Mono', monospace" }}>
            5 of 7 days · longest streak this month
          </div>
        </div>
      </div>
    </IosFrame>
  </div>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
